<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Únete a LIT Nutrition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600;700&display=swap');
  body {
    background: #0e0618;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
  }
  .wrapper {
    position: relative;
    max-width: 480px;
    width: 100%;
    overflow: hidden;
    border-radius: 18px;
    display: block;
  }
  .wrapper img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 18px;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 7%;
    background: linear-gradient(to top, rgba(15,4,35,0.82) 0%, rgba(15,4,35,0.18) 45%, transparent 70%);
    border-radius: 18px;
  }
  .particle {
    position: absolute;
    pointer-events: none;
    z-index: 5;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1.2); }
  }
  
    100% { transform: translateY(110%) rotate(360deg); opacity: 0; }
  }
  .cta-section {
    text-align: center;
    z-index: 10;
    width: 100%;
    padding: 0 1.5rem;
  }
  .cta-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    color: #f0c040;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .cta-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: #ffffff;
    margin-bottom: 0.3rem;
    line-height: 1.3;
    text-shadow: 0 2px 12px rgba(0,0,0,0.7);
  }
  .cta-sub {
    font-size: 12px;
    color: #d8b8f0;
    margin-bottom: 1.1rem;
    text-shadow: 0 1px 6px rgba(0,0,0,0.6);
  }
  .pulse-ring {
    display: inline-block;
    border-radius: 50px;
    padding: 3px;
    background: rgba(200,160,48,0.2);
    animation: pulse-glow 2s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(240,208,96,0.5); }
    50%       { box-shadow: 0 0 0 14px rgba(240,208,96,0); }
  }
  .cta-btn {
    display: inline-block;
    text-decoration: none;
    background: linear-gradient(135deg, #c8a030 0%, #f0d060 50%, #c8a030 100%);
    color: #1a0a2e;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 14px;
    padding: 13px 34px;
    border-radius: 50px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(200,160,48,0.5);
    letter-spacing: 0.4px;
  }
  .cta-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 8px 36px rgba(200,160,48,0.7);
  }
</style>
</head>
